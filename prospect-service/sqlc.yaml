version: "2"
sql:
  - engine: "postgresql"
    # goose-format migrations double as the schema source; sqlc reads the Up blocks.
    schema: "migrations"
    queries: "internal/db/queries.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
